name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest

      - name: Run real LLM smoke test
        if: github.event_name == 'workflow_dispatch' && github.ref_name == 'feature/llm-backed-inventory-agent'
        env:
          RUN_REAL_LLM_SMOKE: "true"
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_API_BASE_URL: "https://api.edgefn.net/v1"
          AI_MODEL_NAME: "DeepSeek-V3.2"
          REAL_LLM_RECOGNIZED_TEXT: "今天喝了一瓶蒙牛纯牛奶"
        run: |
          set -euo pipefail
          test -n "$AI_API_KEY" || {
            echo "Missing repository secret AI_API_KEY"
            exit 1
          }
          ./gradlew :app:testDebugUnitTest --tests com.jishiyong.agent.RealLlmSmokeTest

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: jishiyong-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

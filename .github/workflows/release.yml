name: Release Android APK

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: "Version name, for example 1.0.1"
        required: true
        type: string
      version_code:
        description: "Monotonic Android versionCode"
        required: true
        type: string
      release_notes:
        description: "Release notes"
        required: false
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    env:
      VERSION_NAME: ${{ inputs.version_name }}
      VERSION_CODE: ${{ inputs.version_code }}
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      BAIDU_ASR_APP_ID: ${{ secrets.BAIDU_ASR_APP_ID }}
      BAIDU_ASR_API_KEY: ${{ secrets.BAIDU_ASR_API_KEY }}
      BAIDU_ASR_SECRET_KEY: ${{ secrets.BAIDU_ASR_SECRET_KEY }}
      BAIDU_ASR_DEV_PID: "1537"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Validate release inputs
        run: |
          set -euo pipefail
          [[ "$VERSION_NAME" =~ ^[0-9]+(\.[0-9]+)*$ ]] || {
            echo "version_name must look like 1.0.1"
            exit 1
          }
          [[ "$VERSION_CODE" =~ ^[0-9]+$ ]] || {
            echo "version_code must be an integer"
            exit 1
          }
          test -n "$ANDROID_KEYSTORE_BASE64" || {
            echo "Missing secret ANDROID_KEYSTORE_BASE64"
            exit 1
          }
          test -n "$ANDROID_KEYSTORE_PASSWORD" || {
            echo "Missing secret ANDROID_KEYSTORE_PASSWORD"
            exit 1
          }
          test -n "$ANDROID_KEY_ALIAS" || {
            echo "Missing secret ANDROID_KEY_ALIAS"
            exit 1
          }
          test -n "$ANDROID_KEY_PASSWORD" || {
            echo "Missing secret ANDROID_KEY_PASSWORD"
            exit 1
          }
          test -n "$BAIDU_ASR_APP_ID" || {
            echo "Missing secret BAIDU_ASR_APP_ID"
            exit 1
          }
          test -n "$BAIDU_ASR_API_KEY" || {
            echo "Missing secret BAIDU_ASR_API_KEY"
            exit 1
          }
          test -n "$BAIDU_ASR_SECRET_KEY" || {
            echo "Missing secret BAIDU_ASR_SECRET_KEY"
            exit 1
          }

      - name: Decode signing keystore
        run: |
          set -euo pipefail
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/release.keystore"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest

      - name: Verify Room schemas are committed
        run: |
          set -euo pipefail
          if [ ! -d app/schemas ]; then
            echo "::warning::Missing Room schema directory app/schemas; generate and commit the initial schema from an x86-64 Android SDK environment."
            exit 0
          fi
          status="$(git status --porcelain -- app/schemas)"
          test -z "$status" || {
            echo "$status"
            echo "Room schemas changed; commit the generated files."
            exit 1
          }

      - name: Build signed Release APK
        env:
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/release.keystore
        run: |
          set -euo pipefail
          ./gradlew assembleRelease \
            -PVERSION_NAME="$VERSION_NAME" \
            -PVERSION_CODE="$VERSION_CODE"

      - name: Prepare APK artifact
        run: |
          set -euo pipefail
          APK_NAME="jishiyong-${VERSION_NAME}.apk"
          cp app/build/outputs/apk/release/app-release.apk "$APK_NAME"
          shasum -a 256 "$APK_NAME" > "${APK_NAME}.sha256"
          echo "APK_NAME=$APK_NAME" >> "$GITHUB_ENV"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_NOTES: ${{ inputs.release_notes }}
        run: |
          set -euo pipefail
          TAG="v${VERSION_NAME}"
          NOTES="${RELEASE_NOTES:-及时用 ${VERSION_NAME}}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "$APK_NAME" "${APK_NAME}.sha256" --clobber
          else
            gh release create "$TAG" "$APK_NAME" "${APK_NAME}.sha256" \
              --title "及时用 ${VERSION_NAME}" \
              --notes "$NOTES"
          fi
